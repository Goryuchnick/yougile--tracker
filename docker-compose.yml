services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - events-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import os, signal; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  webhook:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Moscow
      - EVENT_LOG_DB=/app/data/events.db
    expose:
      - "8080"
    volumes:
      - events-data:/app/data
    command: ["python", "-m", "uvicorn", "bot.event_log:app", "--host", "0.0.0.0", "--port", "8080"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yougile-webhook.rule=Host(`yougile-webhook.147.45.184.108.sslip.io`)"
      - "traefik.http.routers.yougile-webhook.entrypoints=http"
      - "traefik.http.services.yougile-webhook.loadbalancer.server.port=8080"
    networks:
      - coolify
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  cron:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=Europe/Moscow
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Cron container started"
        while true; do
          echo "[$(date)] Running ai_prioritizer..."
          python bot/ai_prioritizer.py
          echo "[$(date)] Running knowledge_base_sync..."
          python bot/knowledge_base_sync.py
          echo "[$(date)] Sleeping 24h..."
          sleep 86400
        done

volumes:
  events-data:

networks:
  coolify:
    external: true
