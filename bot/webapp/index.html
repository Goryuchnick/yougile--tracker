<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YouGile Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: #1a1a2e;
  --bg-card: #16213e;
  --bg-card-hover: #1a2744;
  --accent: #0f3460;
  --accent-bright: #533483;
  --text: #e8e8e8;
  --text-dim: #8892a4;
  --red: #ff6b6b;
  --orange: #ffa502;
  --green: #2ed573;
  --blue: #4dabf7;
  --purple: #a78bfa;
  --radius: 14px;
  --shadow: 0 2px 16px rgba(0,0,0,0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 24px 0;
  -webkit-font-smoothing: antialiased;
}

.header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: linear-gradient(135deg, #0f3460 0%, #533483 100%);
  padding: 20px 16px 16px;
  border-radius: 0 0 24px 24px;
  box-shadow: 0 4px 24px rgba(83, 52, 131, 0.3);
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.header .subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-top: 2px;
}

.stats-row {
  display: flex;
  gap: 8px;
  padding: 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.stats-row::-webkit-scrollbar { display: none; }

.stat-card {
  flex: 0 0 auto;
  min-width: 105px;
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 14px;
  text-align: center;
  box-shadow: var(--shadow);
  transition: transform 0.15s;
}
.stat-card:active { transform: scale(0.96); }

.stat-card .num {
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
}
.stat-card .label {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.stat-card.red .num { color: var(--red); }
.stat-card.orange .num { color: var(--orange); }
.stat-card.green .num { color: var(--green); }
.stat-card.blue .num { color: var(--blue); }
.stat-card.purple .num { color: var(--purple); }

.section {
  padding: 0 16px;
  margin-top: 20px;
}

.section-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* Priority bar */
.prio-bar {
  display: flex;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  margin-bottom: 8px;
}
.prio-bar .seg { transition: width 0.6s ease; }
.prio-bar .seg-high { background: var(--red); }
.prio-bar .seg-med { background: var(--orange); }
.prio-bar .seg-low { background: var(--green); }
.prio-bar .seg-none { background: rgba(255,255,255,0.1); }

.prio-legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.prio-legend span {
  font-size: 12px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 4px;
}
.prio-legend .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

/* Columns */
.columns-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.col-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.col-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px; height: 100%;
}
.col-card.active::before { background: var(--blue); }
.col-card.done::before { background: var(--green); }
.col-card.other::before { background: var(--text-dim); }

.col-card .col-name {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.col-card .col-num {
  font-size: 22px;
  font-weight: 800;
  margin-top: 4px;
}

/* Task list */
.task-list { display: flex; flex-direction: column; gap: 6px; }

.task-item {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 12px 14px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: background 0.15s;
  border-left: 3px solid transparent;
}
.task-item:active { background: var(--bg-card-hover); }
.task-item.prio-High { border-left-color: var(--red); }
.task-item.prio-Medium { border-left-color: var(--orange); }
.task-item.prio-Low { border-left-color: var(--green); }

.task-prio {
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.task-prio.High { background: var(--red); box-shadow: 0 0 8px rgba(255,107,107,0.4); }
.task-prio.Medium { background: var(--orange); }
.task-prio.Low { background: var(--green); }
.task-prio.none { background: rgba(255,255,255,0.15); }

.task-body { flex: 1; min-width: 0; }

.task-title {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.3;
  word-break: break-word;
}

.task-meta {
  display: flex;
  gap: 10px;
  margin-top: 4px;
  font-size: 11px;
  color: var(--text-dim);
  flex-wrap: wrap;
}

.task-meta .tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.task-meta .overdue { color: var(--red); font-weight: 600; }
.task-meta .soon { color: var(--orange); font-weight: 600; }

/* Assignees */
.assignee-list { display: flex; flex-direction: column; gap: 6px; }

.assignee-row {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: var(--shadow);
}
.assignee-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-bright), var(--blue));
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  flex-shrink: 0;
}
.assignee-info { flex: 1; }
.assignee-name { font-size: 14px; font-weight: 600; }
.assignee-count { font-size: 12px; color: var(--text-dim); }

.assignee-bar {
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.05);
  margin-top: 6px;
}
.assignee-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--blue), var(--purple));
  transition: width 0.6s ease;
}

/* Events */
.events-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.event-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 12px;
  box-shadow: var(--shadow);
  text-align: center;
}
.event-card .ev-icon { font-size: 20px; }
.event-card .ev-num { font-size: 20px; font-weight: 800; margin-top: 2px; }
.event-card .ev-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; text-transform: uppercase; }

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-text { color: var(--text-dim); font-size: 14px; }

/* Error */
.error-box {
  background: rgba(255,107,107,0.1);
  border: 1px solid rgba(255,107,107,0.3);
  border-radius: var(--radius);
  padding: 20px;
  margin: 20px 16px;
  text-align: center;
}
.error-box .err-icon { font-size: 32px; }
.error-box .err-text { margin-top: 8px; color: var(--red); font-size: 14px; }
.error-box .retry-btn {
  margin-top: 12px;
  background: var(--accent-bright);
  color: white;
  border: none;
  padding: 10px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

.updated-at {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  padding: 16px;
  opacity: 0.6;
}
</style>
</head>
<body>

<div id="root">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Загружаю дашборд...</div>
  </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0f3460');
  tg.setBackgroundColor('#1a1a2e');
}

const API_BASE = window.location.origin;

async function loadDashboard() {
  const root = document.getElementById('root');
  try {
    const resp = await fetch(`${API_BASE}/api/dashboard`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const d = await resp.json();
    if (d.error) throw new Error(d.error);
    root.innerHTML = renderDashboard(d);
  } catch (e) {
    root.innerHTML = `
      <div class="error-box">
        <div class="err-icon">:(</div>
        <div class="err-text">${escHtml(e.message)}</div>
        <button class="retry-btn" onclick="loadDashboard()">Повторить</button>
      </div>`;
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderDashboard(d) {
  const total = d.total_active;
  const pc = d.priority_counts;
  const pTotal = (pc.High||0) + (pc.Medium||0) + (pc.Low||0) + (pc.none||0) || 1;
  const pctH = ((pc.High||0)/pTotal*100).toFixed(1);
  const pctM = ((pc.Medium||0)/pTotal*100).toFixed(1);
  const pctL = ((pc.Low||0)/pTotal*100).toFixed(1);
  const pctN = ((pc.none||0)/pTotal*100).toFixed(1);

  const ev = d.events_7d || {};
  const evCreated = ev['task-created'] || 0;
  const evMoved = ev['task-moved'] || 0;
  const evUpdated = ev['task-updated'] || 0;
  const evComments = ev['chat_message-created'] || 0;

  return `
    <div class="header">
      <h1>${escHtml(d.project)}</h1>
      <div class="subtitle">${escHtml(d.board)}</div>
    </div>

    <div class="stats-row">
      <div class="stat-card blue">
        <div class="num">${total}</div>
        <div class="label">Активных</div>
      </div>
      <div class="stat-card red">
        <div class="num">${d.overdue}</div>
        <div class="label">Просрочено</div>
      </div>
      <div class="stat-card orange">
        <div class="num">${d.due_soon}</div>
        <div class="label">Горит</div>
      </div>
      <div class="stat-card green">
        <div class="num">${d.columns.reduce((s,c) => s + c.completed, 0)}</div>
        <div class="label">Готово</div>
      </div>
      <div class="stat-card purple">
        <div class="num">${d.assignees.length}</div>
        <div class="label">Команда</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Приоритеты</div>
      <div class="prio-bar">
        <div class="seg seg-high" style="width:${pctH}%"></div>
        <div class="seg seg-med" style="width:${pctM}%"></div>
        <div class="seg seg-low" style="width:${pctL}%"></div>
        <div class="seg seg-none" style="width:${pctN}%"></div>
      </div>
      <div class="prio-legend">
        <span><span class="dot" style="background:var(--red)"></span> High ${pc.High||0}</span>
        <span><span class="dot" style="background:var(--orange)"></span> Medium ${pc.Medium||0}</span>
        <span><span class="dot" style="background:var(--green)"></span> Low ${pc.Low||0}</span>
        <span><span class="dot" style="background:rgba(255,255,255,0.15)"></span> - ${pc.none||0}</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Колонки</div>
      <div class="columns-grid">
        ${d.columns.map(c => `
          <div class="col-card ${c.is_active ? 'active' : (c.title === 'Готово' ? 'done' : 'other')}">
            <div class="col-name">${escHtml(c.title)}</div>
            <div class="col-num">${c.active}</div>
          </div>
        `).join('')}
      </div>
    </div>

    ${d.assignees.length ? `
    <div class="section">
      <div class="section-title">Команда</div>
      <div class="assignee-list">
        ${d.assignees.map(a => {
          const initials = a.name.split(' ').map(w => w[0]).join('').slice(0,2);
          const maxCount = Math.max(...d.assignees.map(x => x.count), 1);
          const pct = (a.count / maxCount * 100).toFixed(0);
          return `
          <div class="assignee-row">
            <div class="assignee-avatar">${escHtml(initials)}</div>
            <div class="assignee-info">
              <div class="assignee-name">${escHtml(a.name)}</div>
              <div class="assignee-count">${a.count} задач</div>
              <div class="assignee-bar"><div class="assignee-bar-fill" style="width:${pct}%"></div></div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}

    <div class="section">
      <div class="section-title">Активность за 7 дней</div>
      <div class="events-grid">
        <div class="event-card">
          <div class="ev-icon">+</div>
          <div class="ev-num">${evCreated}</div>
          <div class="ev-label">Создано</div>
        </div>
        <div class="event-card">
          <div class="ev-icon">~</div>
          <div class="ev-num">${evMoved}</div>
          <div class="ev-label">Перемещено</div>
        </div>
        <div class="event-card">
          <div class="ev-icon">!</div>
          <div class="ev-num">${evUpdated}</div>
          <div class="ev-label">Обновлено</div>
        </div>
        <div class="event-card">
          <div class="ev-icon">#</div>
          <div class="ev-num">${evComments}</div>
          <div class="ev-label">Комменты</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Задачи (${d.tasks.length})</div>
      <div class="task-list">
        ${d.tasks.map(t => {
          let dlTag = '';
          if (t.days_to_deadline !== null) {
            if (t.days_to_deadline < 0) dlTag = `<span class="tag overdue">! ${Math.abs(t.days_to_deadline)}д</span>`;
            else if (t.days_to_deadline === 0) dlTag = `<span class="tag overdue">Сегодня</span>`;
            else if (t.days_to_deadline <= 3) dlTag = `<span class="tag soon">${t.days_to_deadline}д</span>`;
            else dlTag = `<span class="tag">${t.days_to_deadline}д</span>`;
          }
          return `
          <div class="task-item prio-${t.priority}">
            <div class="task-prio ${t.priority}"></div>
            <div class="task-body">
              <div class="task-title">${escHtml(t.title)}</div>
              <div class="task-meta">
                ${t.key ? `<span class="tag">${escHtml(t.key)}</span>` : ''}
                <span class="tag">${escHtml(t.column)}</span>
                ${t.assignee ? `<span class="tag">${escHtml(t.assignee)}</span>` : ''}
                ${dlTag}
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="updated-at">${new Date(d.updated_at).toLocaleString('ru-RU')}</div>
  `;
}

loadDashboard();
</script>
</body>
</html>
